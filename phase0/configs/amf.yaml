logger:
  file:
    path: /opt/open5gs/var/log/open5gs/amf.log

amf:
  sbi:
    server:
      - dev: eth0
        port: 7777
    client:
      nrf:
        - uri: http://nrf:7777
  ngap:
    server:
      - dev: eth0
  guami:
    - plmn_id:
        mcc: 999
        mnc: 70
      amf_id:
        region: 2
        set: 1
  tai:
    - plmn_id:
        mcc: 999
        mnc: 70
      tac: 1
  plmn_support:
    - plmn_id:
        mcc: 999
        mnc: 70
      s_nssai:
        - sst: 1
          sd: 1
  security:
    integrity_order: [NIA2, NIA1, NIA0]
    ciphering_order: [NEA0, NEA1, NEA2]
  network_name:
    full: NeonCore
  amf_name: neoncore-amf0
  time:
    t3512:
      value: 540
  metrics:
    server:
      - dev: eth0
        port: 9090
