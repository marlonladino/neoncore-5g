logger:
  file:
    path: /opt/open5gs/var/log/open5gs/smf.log

smf:
  sbi:
    server:
      - dev: eth0
        port: 7777
    client:
      nrf:
        - uri: http://nrf:7777
  pfcp:
    server:
      - dev: eth0
    client:
      upf:
        - address: upf
  gtpc:
    server:
      - dev: eth0
  gtpu:
    server:
      - dev: eth0
  session:
    - subnet: 10.45.0.0/16
      gateway: 10.45.0.1
      dnn: internet
  dns:
    - 8.8.8.8
    - 8.8.4.4
  mtu: 1400
  metrics:
    server:
      - dev: eth0
        port: 9090
