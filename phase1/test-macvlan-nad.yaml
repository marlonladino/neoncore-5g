apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: test-macvlan
  namespace: default
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.200.0/24",
        "rangeStart": "192.168.200.10",
        "rangeEnd": "192.168.200.50"
      }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: test-macvlan-pod
  namespace: default
  annotations:
    k8s.v1.cni.cncf.io/networks: test-macvlan
spec:
  containers:
    - name: test
      image: busybox
      command: ["sleep", "3600"]
  restartPolicy: Never
