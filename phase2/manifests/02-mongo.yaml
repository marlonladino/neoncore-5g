apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-storage
  namespace: neoncore
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: neoncore
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: mongo }
  template:
    metadata:
      labels: { app: mongo }
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
          resources:
            requests: { cpu: 50m, memory: 128Mi }
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.runCommand({ping:1})"]
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - { name: mongo-storage, mountPath: /data/db }
      volumes:
        - name: mongo-storage
          persistentVolumeClaim: { claimName: mongo-storage }
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: neoncore
spec:
  selector: { app: mongo }
  ports:
    - port: 27017
      targetPort: 27017
