apiVersion: v1
kind: Service
metadata:
  name: nrf
  namespace: neoncore
spec:
  clusterIP: None
  selector: { app: nrf }
  ports: [{ port: 7777 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrf
  namespace: neoncore
spec:
  replicas: 1
  selector: { matchLabels: { app: nrf } }
  template:
    metadata:
      labels: { app: nrf }
    spec:
      containers:
        - name: nrf
          image: gradiant/open5gs:2.8.0
          command: ["open5gs-nrfd"]
          resources: { requests: { cpu: 20m, memory: 32Mi } }
          volumeMounts:
            - { name: config, mountPath: /opt/open5gs/etc/open5gs/nrf.yaml, subPath: nrf.yaml }
      volumes:
        - name: config
          configMap: { name: nrf-config }
---
