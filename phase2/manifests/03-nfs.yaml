apiVersion: v1
kind: Service
metadata:
  name: upf
  namespace: neoncore
spec:
  clusterIP: None
  selector: { app: upf }
  ports:
    - { name: pfcp, port: 8805, protocol: UDP }
    - { name: gtpu, port: 2152, protocol: UDP }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upf
  namespace: neoncore
spec:
  replicas: 1
  selector: { matchLabels: { app: upf } }
  template:
    metadata:
      labels: { app: upf }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: upf
          # Custom build with N3 GTP packet-count metrics re-enabled --
          # see phase2/upf-metrics-patch/. Built locally, not on a registry.
          image: neoncore-upf:2.8.0-metrics
          imagePullPolicy: IfNotPresent
          command: ["open5gs-upfd"]
          resources: { requests: { cpu: 20m, memory: 48Mi } }
          securityContext:
            runAsUser: 0
            capabilities:
              add: ["NET_ADMIN"]
          lifecycle:
            postStart:
              exec:
                # open5gs-upfd creates ogstun itself but leaves it DOWN with no address and sets
                # up no NAT — without this the UE gets a PDU session but all data-plane traffic
                # silently dies at the UPF (ogs_tun_write I/O errors, zero return path to the
                # internet). Values match upf.yaml's session subnet/gateway.
                command:
                  - sh
                  - -c
                  - |
                    until ip link show ogstun >/dev/null 2>&1; do sleep 1; done
                    ip addr add 10.45.0.1/16 dev ogstun
                    ip link set ogstun up
                    iptables -t nat -A POSTROUTING -s 10.45.0.0/16 -o eth0 -j MASQUERADE
          volumeMounts:
            - { name: config, mountPath: /opt/open5gs/etc/open5gs/upf.yaml, subPath: upf.yaml }
            - { name: dev-tun, mountPath: /dev/net/tun }
      volumes:
        - name: config
          configMap: { name: upf-config }
        - name: dev-tun
          hostPath: { path: /dev/net/tun, type: CharDevice }
