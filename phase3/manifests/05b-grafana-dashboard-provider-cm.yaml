apiVersion: v1
data:
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: NeonCore
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
