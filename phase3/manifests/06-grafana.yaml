apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata: { labels: { app: grafana } }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          env:
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "true" }
            - { name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Admin" }
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: "neoncore" }
          ports:
            - containerPort: 3000
          resources:
            requests: { cpu: 20m, memory: 128Mi }
          volumeMounts:
            - { name: datasource, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashboard-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboard-json, mountPath: /var/lib/grafana/dashboards }
      volumes:
        - name: datasource
          configMap: { name: grafana-datasource }
        - name: dashboard-provider
          configMap: { name: grafana-dashboard-provider }
        - name: dashboard-json
          configMap: { name: grafana-dashboard-neoncore }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: NodePort
  selector: { app: grafana }
  ports:
    - port: 3000
      nodePort: 30030
