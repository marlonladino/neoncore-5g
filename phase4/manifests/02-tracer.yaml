apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracer
  namespace: neoncore
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: tracer } }
  template:
    metadata: { labels: { app: tracer } }
    spec:
      hostNetwork: true
      containers:
        - name: tracer
          image: nicolaka/netshoot:latest
          command: ["/bin/sh", "/scripts/capture.sh"]
          env:
            - { name: PCAP_DIR, value: "/pcaps" }
            - { name: ROTATE_SECONDS, value: "300" }
            - { name: MAX_FILE_MB, value: "50" }
            - { name: RETENTION_MINUTES, value: "120" }
          securityContext:
            privileged: true
          resources:
            requests: { cpu: 20m, memory: 64Mi }
          volumeMounts:
            - { name: pcaps, mountPath: /pcaps }
            - { name: script, mountPath: /scripts }
      volumes:
        - name: pcaps
          persistentVolumeClaim: { claimName: pcap-storage }
        - name: script
          configMap: { name: tracer-script, defaultMode: 0755 }
